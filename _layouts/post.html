---
layout: default
---
<article class="post">
  <header class="post-hero">
    <p class="eyebrow">{{ page.category | default: "Neuroscience Literacy" }} · {{ page.date | date: "%Y.%m.%d" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="description">{{ page.description }}</p>{% endif %}
    <p class="byline">{{ page.author | default: site.author }}</p>
  </header>
  {% if page.image %}
  <figure class="post-thumbnail">
    <img src="{{ page.image | relative_url }}" alt="{{ page.image_alt | default: page.title }}" loading="lazy">
  </figure>
  {% endif %}
  <div class="post-content">
    {{ content }}
  </div>
</article>
