<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
  {% if page.image %}
  <meta property="og:image" content="{{ page.image | absolute_url }}">
  <meta property="og:image:alt" content="{{ page.image_alt | default: page.title }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ page.image | absolute_url }}">
  {% endif %}
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">Everyday Neuroscience Lab</a>
    <nav>
      <a href="{{ '/' | relative_url }}">블로그</a>
      <a href="{{ '/about/' | relative_url }}">소개</a>
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </nav>
  </header>
  <main class="container">
    {{ content }}
  </main>
  <footer class="site-footer">
    <p>© {{ site.time | date: '%Y' }} Everyday Neuroscience Lab · 뇌과학을 쉽게, 배움과 회복에 쓸 수 있게.</p>
  </footer>
</body>
</html>
